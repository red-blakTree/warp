name: OpenWarp Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CONFIG_FILE: ".github/workflows/release_configurations.json"
  CHANNEL: oss

jobs:
  build_and_publish:
    name: Build & Publish Release (Linux x86_64 RPM)
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # 手动触发时不存在 tag，此时会检出当前分支最新代码，后面会动态生成 tag 名称
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.ref_name }}

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            BRANCH="$TAG"
          else
            TAG="v0.$(date +%Y.%m.%d.%H%M)"
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG / build ref: $BRANCH"

      - name: Get channel configuration
        id: get-config
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ env.CHANNEL }}

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add x86_64-unknown-linux-gnu
        shell: bash

      - name: Install rpm-build
        run: sudo apt-get update && sudo apt-get install -y rpm
        shell: bash

      - name: Build RPM (unsigned)
        id: bundle_app
        run: script/bundle --channel "$CHANNEL" --arch x86_64 --packages rpm
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ steps.meta.outputs.tag }}

      - name: Locate RPM artifact
        id: locate_rpm
        shell: bash
        run: |
          RPM_PATH="${{ steps.bundle_app.outputs.rpm_path }}"
          if [[ -z "$RPM_PATH" || ! -f "$RPM_PATH" ]]; then
            echo "::warning::rpm_path output empty or missing, falling back to find"
            RPM_PATH="$(find . -name '*.rpm' -type f | head -1)"
          fi
          if [[ -z "$RPM_PATH" ]]; then
            echo "::error::No .rpm file found"
            exit 1
          fi
          echo "rpm_path=$RPM_PATH" >> $GITHUB_OUTPUT
          echo "Found RPM: $RPM_PATH"

      - name: Create GitHub Release and upload RPM
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ steps.get-config.outputs.release_base_name }} ${{ steps.meta.outputs.tag }}
          tag_name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.get-config.outputs.release_body_text }}
          draft: false
          prerelease: false
          make_latest: "true"
          files: ${{ steps.locate_rpm.outputs.rpm_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
