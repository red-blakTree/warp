# OpenWarp 发布流水线 — 仅 RPM 构建（Linux x86_64）
# 触发条件：push tag (v*) 或手动 dispatch
name: OpenWarp Release (RPM only)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CONFIG_FILE: ".github/workflows/release_configurations.json"
  CHANNEL: oss

jobs:
  prepare_metadata:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute_tag.outputs.tag }}
      release_branch: ${{ steps.compute_tag.outputs.branch }}
      release_name: ${{ steps.get-config.outputs.release_base_name }} ${{ steps.compute_tag.outputs.tag }}
      release_body: ${{ steps.get-config.outputs.release_body_text }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get channel configuration
        id: get-config
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ env.CHANNEL }}

      - name: Compute release tag and branch
        id: compute_tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            BRANCH="$TAG"
          else
            TAG="v0.$(date +%Y.%m.%d.%H%M)"
            BRANCH="${GITHUB_REF#refs/heads/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG / build ref: $BRANCH"

  build_rpm:
    name: Build RPM (Linux x86_64)
    runs-on: ubuntu-latest
    needs: prepare_metadata
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare_metadata.outputs.release_branch }}

      - name: Get channel configuration
        uses: ./.github/actions/get_channel_config/
        with:
          config_file: ${{ env.CONFIG_FILE }}
          channel: ${{ env.CHANNEL }}

      - name: Prepare environment
        uses: ./.github/actions/prepare_environment
        with:
          target_os: linux
          is_self_hosted: false
          install_release_deps: true

      - name: Ensure rust target is installed
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Install rpm-build
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build RPM
        id: bundle_app
        run: script/bundle --channel "$CHANNEL" --arch x86_64 --packages rpm
        shell: bash
        env:
          GIT_RELEASE_TAG: ${{ needs.prepare_metadata.outputs.release_tag }}

      - name: Locate RPM artifact
        id: locate_rpm
        shell: bash
        run: |
          RPM_PATH="${{ steps.bundle_app.outputs.rpm_path }}"
          if [[ -z "$RPM_PATH" || ! -f "$RPM_PATH" ]]; then
            echo "::warning::rpm_path output empty or missing, falling back to find"
            RPM_PATH="$(find . -name '*.rpm' -type f | head -1)"
          fi
          if [[ -z "$RPM_PATH" ]]; then
            echo "::error::No .rpm file found"
            exit 1
          fi
          echo "rpm_path=$RPM_PATH" >> $GITHUB_OUTPUT
          echo "Found RPM: $RPM_PATH"

      - name: Upload RPM as workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: openwarp-linux-x86_64-rpm
          path: ${{ steps.locate_rpm.outputs.rpm_path }}
          if-no-files-found: error
          retention-days: 7

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare_metadata
      - build_rpm
    steps:
      - name: Download RPM artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: openwarp-linux-x86_64-rpm
          path: dist

      - name: List downloaded files
        run: ls -lh dist

      - name: Create GitHub Release and upload RPM
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ needs.prepare_metadata.outputs.release_name }}
          tag_name: ${{ needs.prepare_metadata.outputs.release_tag }}
          body: ${{ needs.prepare_metadata.outputs.release_body }}
          draft: false
          prerelease: false
          make_latest: "true"
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete workflow artifacts to free Actions storage
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ids=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[].id')
          for id in $ids; do
            echo "Deleting artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
        shell: bash
